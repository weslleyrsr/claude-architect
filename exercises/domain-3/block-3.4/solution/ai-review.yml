name: AI Code Review

on:
  pull_request:
    branches: [main, develop]

jobs:
  ai-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for diff

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Get PR diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > pr-diff.txt
          echo "Diff size: $(wc -l < pr-diff.txt) lines"

      - name: AI Code Review
        timeout-minutes: 5
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "Review this code diff for bugs, security vulnerabilities, and major style issues.
          Output a JSON object: { \"critical\": [list of critical issues], \"warnings\": [list of warnings], \"summary\": \"one sentence\" }.
          Only output JSON, no markdown wrapping." < pr-diff.txt > review.json

          echo "Review output:"
          cat review.json

      - name: Check for critical issues
        run: |
          CRITICAL=$(cat review.json | python3 -c "import json,sys; d=json.load(sys.stdin); print(len(d.get('critical', [])))")
          echo "Critical issues found: $CRITICAL"
          if [ "$CRITICAL" -gt "0" ]; then
            echo "❌ Critical issues found — failing CI"
            exit 1
          fi
          echo "✅ No critical issues found"

      - name: Post review comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const review = JSON.parse(fs.readFileSync('review.json', 'utf8'))
            const body = `## AI Code Review\n\n**Summary:** ${review.summary}\n\n` +
              (review.critical.length ? `### ❌ Critical Issues\n${review.critical.map(i => `- ${i}`).join('\n')}\n\n` : '') +
              (review.warnings.length ? `### ⚠️ Warnings\n${review.warnings.map(i => `- ${i}`).join('\n')}` : '✅ No warnings')

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            })
